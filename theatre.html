<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Theatre</title>
<meta name="description" content="Theatre photography by Anna Urik — visual storytelling with Cirk La Putyka & Jatka78. Translating live performance into intimate, visceral images." />
<style>
:root{
  --bg:#2b2828;
  --fg:#f3f3f3;
  --muted:#e8e8e8cc;
  --accent:#E0332F;
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--fg);font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif}

.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
@media (max-width:980px){.back-home{top:12px;left:12px;padding:.5rem .75rem}}

.hero{
  max-width:var(--maxw);margin:0 auto;
  padding:clamp(48px,6vw,80px) clamp(16px,4vw,32px) clamp(24px,4vw,48px);
  display:grid;grid-template-columns:1.08fr 0.92fr;
  gap:clamp(24px,5vw,72px);align-items:start;
}
@media (max-width:1000px){.hero{grid-template-columns:1fr}}

.media-left{background:#222;overflow:hidden}
.media-left img{width:100%;height:auto;display:block}
.right{display:grid;grid-template-rows:auto auto 1fr;gap:clamp(14px,2.2vw,24px)}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(3.2rem,10vw,8rem);line-height:.9;letter-spacing:.01em}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2.2rem,6.2vw,4.2rem);line-height:.95}
.lead{margin:0;color:var(--muted);max-width:58ch;font-size:clamp(1rem,1.35vw,1.15rem);line-height:1.6}
.media-right{background:#222;overflow:hidden;margin-top:clamp(12px,2.4vw,24px)}
.media-right img{width:100%;height:auto;display:block}

@media (max-width:700px){
  .case-num{font-size:clamp(2.6rem,16vw,5rem)}
  .case-title{font-size:clamp(1.8rem,10vw,3rem)}
  .media-left,.media-right{max-height:75vw;overflow:hidden}
  .media-left img,.media-right img{height:100%;object-fit:cover;object-position:center}
}

/* ── Editorial gallery ── */
.gallery{
  max-width:960px;
  margin:0 auto;
  padding:clamp(24px,5vw,64px) clamp(24px,5vw,64px) clamp(64px,10vw,120px);
  display:flex;
  flex-direction:column;
  gap:clamp(28px,4vw,64px);
}
.row{display:grid;gap:clamp(12px,2vw,28px);align-items:start}
.r-6-6{grid-template-columns:1fr 1fr}
.r-7-5{grid-template-columns:7fr 5fr}
.r-5-7{grid-template-columns:5fr 7fr}
.fig{margin:0}
.fig img{width:100%;height:auto;display:block}
.center   {max-width:72%;margin:0 auto}
.center-lg{max-width:88%;margin:0 auto}
.push-r   {max-width:72%;margin-left:auto}
@media(max-width:700px){
  .r-6-6,.r-7-5,.r-5-7{grid-template-columns:1fr}
  .center,.center-lg,.push-r{max-width:100%;margin:0}
}

/* Back to top */
.btt{
  position:fixed;bottom:24px;right:24px;z-index:999;
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:50%;
  background:#00000080;border:1px solid #ffffff22;
  backdrop-filter:blur(6px);box-shadow:0 1px 4px #00000066;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  color:#fff;text-decoration:none;
}
.btt.visible{opacity:1;pointer-events:auto}
.btt:hover{background:#000000b0;transform:translateY(-2px)}
.btt svg{width:16px;height:16px;display:block}
</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Anna Urik">
  <meta property="og:title" content="Theatre | Anna Urik">
  <meta property="og:description" content="Theatre photography by Anna Urik — visual storytelling with Cirk La Putyka & Jatka78. Translating live performance into intimate, visceral images.">
  <meta property="og:url" content="https://annaurik.com/theatre">
  <meta property="og:image" content="https://annaurik.com/photos/theatre/theatre_31.webp">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Theatre | Anna Urik">
  <meta name="twitter:description" content="Theatre photography by Anna Urik — visual storytelling with Cirk La Putyka & Jatka78. Translating live performance into intimate, visceral images.">
  <meta name="twitter:image" content="https://annaurik.com/photos/theatre/theatre_31.webp">
  <link rel="canonical" href="https://annaurik.com/theatre">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ImageGallery",
    "name": "Theatre — Anna Urik",
    "description": "Theatre photography with Cirk La Putyka & Jatka78",
    "url": "https://annaurik.com/theatre",
    "author": {"@type": "Person", "name": "Anna Urik"}
  }
  </script>
</head>
<body id="top">
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<main>
  <div class="hero">
    <figure class="media-left">
      <img src="photos/theatre/theatre_31.webp" alt="Cirk La Putyka" loading="eager" decoding="async">
    </figure>
    <section class="right">
      <h2 class="case-num">01</h2>
      <h1 class="case-title">THEATRE</h1>
      <p class="lead">
        With Cirk La Putyka, I explored the space where theatre meets motion — translating live
        energy into visual stories that feel intimate, visceral, and alive. My work defined
        the company's digital identity and visual archive.
      </p>
      <figure class="media-right">
        <img src="photos/theatre/theatre_34.webp" alt="Cirk La Putyka" loading="lazy" decoding="async">
      </figure>
    </section>
  </div>

  <div class="gallery">

    <figure class="fig center-lg">
      <img src="photos/theatre/theatre_22.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <div class="row r-6-6">
      <figure class="fig"><img src="photos/theatre/theatre_29.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/theatre/theatre_30.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <figure class="fig push-r">
      <img src="photos/theatre/theatre_23.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <div class="row r-7-5">
      <figure class="fig"><img src="photos/theatre/theatre_32.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/theatre/theatre_33.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <figure class="fig center">
      <img src="photos/theatre/theatre_35.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <figure class="fig center-lg">
      <img src="photos/theatre/theatre_36.webp" alt="" loading="lazy" decoding="async">
    </figure>

  </div>
</main>

<a class="btt" href="#top" aria-label="Back to top" id="btt">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</a>
<script>
(function(){
  var btn = document.getElementById('btt');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', window.scrollY > 400);
  }, {passive:true});
})();
</script>
</body>
</html>
