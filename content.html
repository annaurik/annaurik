<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Work</title>
<meta name="description" content="Work — Gentle Gesture, Home of the Good Chair, Salina." />
<style>
:root{
  --cream:#F6F2E2;
  --ink:#171717;
  --muted:#2d2d2dcc;
  --accent:#D7302E;
  --rule:#c8c2b6;
  --maxw:1280px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  background:var(--cream);
  color:var(--ink);
  font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif;
}

.back-home{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}

.wrap{
  max-width:var(--maxw);
  margin:0 auto;
  padding:clamp(72px,8vw,120px) clamp(24px,5vw,64px) clamp(64px,8vw,100px);
}

.page-title{
  margin:0 0 clamp(48px,7vw,96px);
  font-weight:900;
  color:var(--accent);
  font-size:clamp(2.4rem,9vw,6rem);
  letter-spacing:.01em;
  line-height:.95;
}

.projects{
  list-style:none;
  margin:0;padding:0;
}

.project{
  border-top:1px solid var(--rule);
  padding:clamp(28px,4vw,56px) clamp(16px,3vw,48px);
  position:relative;
  background-size:cover;
  background-position:center;
  overflow:hidden;
}
.project:last-child{border-bottom:1px solid var(--rule)}

/* cream fade over background image */
.project::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(246,242,226,0.88);
  transition:background .4s ease;
}
.project:hover::before{background:rgba(246,242,226,0.78)}
.project a{position:relative;z-index:1}

.project a{
  display:block;
  text-decoration:none;
  color:var(--ink);
  max-width:58%;
}
.project a:hover .project-name{color:var(--accent)}
.project a:hover .project-name::after{transform:scaleX(1)}

/* left / right alternation */
.project--left  a{margin-right:auto}
.project--right a{margin-left:auto;text-align:right}

.project-num{
  display:block;
  font-size:clamp(.75rem,1.2vw,.9rem);
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:.6rem;
}

.project-name{
  display:block;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.03em;
  font-size:clamp(1.8rem,5.5vw,4.2rem);
  line-height:.95;
  margin-bottom:.6rem;
  position:relative;
  transition:color .2s ease;
}
.project-name::after{
  content:"";
  position:absolute;left:0;bottom:-.1em;
  height:2px;width:100%;
  background:var(--accent);
  transform:scaleX(0);transform-origin:left;
  transition:transform .25s ease;
}
.project--right .project-name::after{
  transform-origin:right;
}

.project-sub{
  display:block;
  font-size:clamp(.85rem,1.3vw,1rem);
  color:var(--muted);
  letter-spacing:.04em;
}

@media(max-width:700px){
  .project a{max-width:80%}
}
@media(max-width:480px){
  .project a{max-width:100%}
  .project--right a{text-align:left;margin-left:0}
}
</style>
</head>
<body>
<a class="back-home" href="/" aria-label="Home">HOME</a>

<main class="wrap">
  <h1 class="page-title">WORK</h1>

  <ol class="projects">

    <li class="project project--left" style="background-image:url('photos/gg/gg_28.webp')">
      <a href="/gentle-gesture">
        <span class="project-num">01</span>
        <span class="project-name">Gentle Gesture</span>
        <span class="project-sub">Fashion &amp; editorial</span>
      </a>
    </li>

    <li class="project project--right" style="background-image:url('photos/chair/chair_04.webp')">
      <a href="/home-of-the-good-chair">
        <span class="project-num">02</span>
        <span class="project-name">Home of the Good Chair</span>
        <span class="project-sub">Interior &amp; still life</span>
      </a>
    </li>

    <li class="project project--left" style="background-image:url('photos/salina/salina_01.webp')">
      <a href="/salina">
        <span class="project-num">03</span>
        <span class="project-name">Salina</span>
        <span class="project-sub">Portrait &amp; fashion</span>
      </a>
    </li>

  </ol>
</main>
</body>
</html>
