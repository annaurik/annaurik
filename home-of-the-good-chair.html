<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Home of the Good Chair</title>
<meta name="description" content="Home of the Good Chair — interior and still life photography by Anna Urik." />
<style>
:root{
  --bg:#141210;
  --fg:#f3f3f3;
  --muted:#e8e8e8cc;
  --accent:#E0332F;
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--fg);font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif}

.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
@media (max-width:980px){.back-home{top:12px;left:12px;padding:.5rem .75rem}}

.hero{
  max-width:var(--maxw);margin:0 auto;
  padding:clamp(48px,6vw,80px) clamp(16px,4vw,32px) clamp(24px,4vw,48px);
  display:grid;grid-template-columns:1.08fr 0.92fr;
  gap:clamp(24px,5vw,72px);align-items:start;
}
@media (max-width:1000px){.hero{grid-template-columns:1fr}}

.media-left{background:#222;overflow:hidden}
.media-left img{width:100%;height:auto;display:block}

.right{display:grid;grid-template-rows:auto auto 1fr;gap:clamp(14px,2.2vw,24px)}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(3.2rem,10vw,8rem);line-height:.9;letter-spacing:.01em}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2rem,5.5vw,3.8rem);line-height:.95}
.lead{margin:0;color:var(--muted);max-width:58ch;font-size:clamp(1rem,1.35vw,1.15rem);line-height:1.6}

.media-right{background:#222;overflow:hidden;margin-top:clamp(12px,2.4vw,24px)}
.media-right img{width:100%;height:auto;display:block}

@media (max-width:700px){
  .case-num{font-size:clamp(2.6rem,16vw,5rem)}
  .case-title{font-size:clamp(1.8rem,8vw,2.8rem)}
}

/* ── Photo grid ── */
.grid-section{
  max-width:var(--maxw);margin:0 auto;
  padding:0 clamp(16px,4vw,32px) clamp(48px,6vw,80px);
}
.grid{
  columns:3;
  column-gap:clamp(8px,1.6vw,16px);
}
@media (max-width:900px){.grid{columns:2}}
@media (max-width:500px){.grid{columns:1}}

.grid-cell{
  break-inside:avoid;
  margin-bottom:clamp(8px,1.6vw,16px);
  background:#222;
  overflow:hidden;
}
.grid-cell img{width:100%;height:auto;display:block;transition:transform .4s ease}
.grid-cell:hover img{transform:scale(1.02)}

</style>
</head>
<body>
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<main>
  <div class="hero">
    <figure class="media-left">
      <img src="photos/chair/chair_04.webp" alt="Home of the Good Chair" loading="eager" decoding="async">
    </figure>
    <section class="right">
      <h2 class="case-num">04</h2>
      <h1 class="case-title">HOME OF<br>THE GOOD<br>CHAIR</h1>
      <p class="lead">
        Warmth, weight, and the quiet dignity of objects. A series exploring interior space
        as biography — where furniture holds memory and light tells the time of day.
        Shot on location with natural light and minimal intervention.
      </p>
      <figure class="media-right">
        <img src="photos/chair/chair_13.webp" alt="Home of the Good Chair — detail" loading="lazy" decoding="async">
      </figure>
    </section>
  </div>

  <div class="grid-section">
    <div class="grid" role="list">

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_07.webp" alt="" loading="lazy" decoding="async">
      </div>

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_01.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_02.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_03.webp" alt="" loading="lazy" decoding="async">
      </div>

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_10.webp" alt="" loading="lazy" decoding="async">
      </div>

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_08.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_09.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_11.webp" alt="" loading="lazy" decoding="async">
      </div>

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_15.webp" alt="" loading="lazy" decoding="async">
      </div>

      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_14.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_17.webp" alt="" loading="lazy" decoding="async">
      </div>
      <div class="grid-cell" role="listitem">
        <img src="photos/chair/chair_18.webp" alt="" loading="lazy" decoding="async">
      </div>

    </div>
  </div>
</main>
</body>
</html>
