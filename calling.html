<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Calling</title>
<meta name="description" content="Calling — film and moving image work by Anna Urik. Beauty, fashion and portraiture on screen. Each film a collaboration with a subject, a mood, a moment." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
:root{
  --bg:#0e0e0e;
  --fg:#f4f1ea;
  --muted:#d7d2c8;
  --accent:#E0332F;
  --rule:#ffffff18;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);
  font-family:"Minima Expanded SSi",Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial;
}
.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
.page-header{
  padding:clamp(72px,8vw,100px) clamp(32px,5vw,64px) clamp(20px,3vw,32px);
  display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid var(--rule);
}
.title-group{display:flex;align-items:baseline;gap:clamp(12px,2vw,24px)}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(2rem,5vw,4.5rem);line-height:.9}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2rem,5vw,4.5rem);line-height:.9}
.lead-header{max-width:38ch;text-align:right;font-size:clamp(.75rem,1.1vw,.9rem);color:var(--muted);letter-spacing:.04em;line-height:1.6;align-self:center}
@media(max-width:768px){.lead-header{display:none}}
.slider-wrap{
  display:grid;
  grid-template-columns:clamp(40px,5vw,72px) 1fr clamp(40px,5vw,72px);
  align-items:center;
  padding:clamp(32px,5vw,64px) 0;
  max-width:1200px;
  margin:0 auto;
}
.arrow{
  display:flex;align-items:center;justify-content:center;height:100%;
  background:none;border:none;cursor:pointer;color:var(--fg);opacity:.5;
  transition:opacity .2s ease;padding:0;
}
.arrow:hover:not(:disabled){opacity:1}
.arrow:disabled{opacity:.15;cursor:default}
.arrow svg{width:clamp(20px,2.5vw,32px);height:clamp(20px,2.5vw,32px)}
.slides-area{position:relative}
.slide{display:none}
.slide.active{display:block}
.slide video{width:100%;display:block;background:#111;max-height:78vh}
/* Hide controls, show on hover */
.slide video::-webkit-media-controls-panel{opacity:0;transition:opacity .25s ease}
.slide video:hover::-webkit-media-controls-panel{opacity:1}
.footer-bar{
  display:flex;align-items:center;gap:clamp(16px,3vw,40px);
  padding:0 clamp(32px,5vw,64px) clamp(48px,6vw,80px);
  max-width:1200px;margin:0 auto;
}
.track{flex:1;height:1px;background:var(--rule);position:relative}
.track-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);transition:width .35s ease}
.counter{font-weight:900;font-size:clamp(1rem,2.2vw,1.6rem);letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.counter .cur{color:var(--fg)}
.counter .sep{color:var(--rule);margin:0 .3em}
.counter .tot{color:var(--muted);font-size:.7em}
</style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Anna Urik">
  <meta property="og:title" content="Calling | Anna Urik">
  <meta property="og:description" content="Calling — film and moving image work by Anna Urik. Beauty, fashion and portraiture on screen. Each film a collaboration with a subject, a mood, a moment.">
  <meta property="og:url" content="https://annaurik.com/calling">
  <meta property="og:image" content="https://annaurik.com/photos/calling/redlip_32.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Calling | Anna Urik">
  <meta name="twitter:description" content="Calling — film and moving image work by Anna Urik. Beauty, fashion and portraiture on screen. Each film a collaboration with a subject, a mood, a moment.">
  <meta name="twitter:image" content="https://annaurik.com/photos/calling/redlip_32.jpg">
  <link rel="canonical" href="https://annaurik.com/calling">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGallery",
    "name": "Calling — Anna Urik",
    "description": "Film and moving image work",
    "url": "https://annaurik.com/calling",
    "author": {"@type": "Person", "name": "Anna Urik"}
  }
  </script>
</head>
<body>
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<div class="page-header">
  <div class="title-group">
    <h2 class="case-num">05</h2>
    <h1 class="case-title">CALLING</h1>
  </div>
  <p class="lead-header">Moving image work spanning beauty,<br>fashion, and portraiture.</p>
</div>

<div class="slider-wrap">
  <button class="arrow" id="prev" aria-label="Previous" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="slides-area">
    <div class="slides" id="slides">

      <div class="slide active">
        <video controls preload="metadata" poster="photos/calling/callinginsta.jpg">
          <source src="videos/calling/callinginsta.mp4" type="video/mp4">
        </video>
      </div>

      <div class="slide">
        <video controls preload="none" poster="photos/calling/redlip_32.jpg">
          <source src="videos/calling/redlip_32.mp4" type="video/mp4">
        </video>
      </div>

      <div class="slide">
        <video controls preload="none" poster="photos/calling/suit_3.jpg">
          <source src="videos/calling/calling_suit3.mp4" type="video/mp4">
        </video>
      </div>

      <div class="slide">
        <video controls preload="none" poster="photos/calling/cleanbeauty_3.jpg">
          <source src="videos/calling/calling_cleanbeauty.mp4" type="video/mp4">
        </video>
      </div>

      <div class="slide">
        <video controls preload="none" poster="photos/calling/suit_32.jpg">
          <source src="videos/calling/suit_32.mp4" type="video/mp4">
        </video>
      </div>

    </div>
  </div>

  <button class="arrow" id="next" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<div class="footer-bar">
  <div class="counter">
    <span class="cur" id="current">01</span><span class="sep">/</span><span class="tot" id="total">05</span>
  </div>
  <div class="track">
    <div class="track-fill" id="progress"></div>
  </div>
</div>

<script>
(function(){
  var slides = document.querySelectorAll('.slide');
  var total  = slides.length;
  var prev   = document.getElementById('prev');
  var next   = document.getElementById('next');
  var curEl  = document.getElementById('current');
  var fill   = document.getElementById('progress');
  var cur    = 0;

  function pad(n){ return (n<10?'0':'')+n; }

  function go(n){
    slides[cur].querySelector('video').pause();
    slides[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    var vid = slides[cur].querySelector('video');
    if(vid){ vid.currentTime=0; vid.play().catch(function(){}); }
    curEl.textContent = pad(cur+1);
    prev.disabled = cur===0;
    next.disabled  = cur===total-1;
    fill.style.width = ((cur+1)/total*100)+'%';
  }

  prev.addEventListener('click', function(){ if(cur>0) go(cur-1); });
  next.addEventListener('click', function(){ if(cur<total-1) go(cur+1); });
  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight' && cur<total-1) go(cur+1);
    if(e.key==='ArrowLeft'  && cur>0)       go(cur-1);
  });

  document.getElementById('total').textContent = pad(total);
  fill.style.width = (1/total*100)+'%';
})();
</script>
</body>
</html>
