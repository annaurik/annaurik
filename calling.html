<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Calling</title>
<meta name="description" content="Calling — film and moving image work by Anna Urik." />
<style>
:root{
  --bg:#0e0e0e;
  --fg:#f3f3f3;
  --muted:#e8e8e8cc;
  --accent:#E0332F;
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--fg);font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif}

.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
@media (max-width:980px){.back-home{top:12px;left:12px;padding:.5rem .75rem}}

.wrap{
  max-width:var(--maxw);
  margin:0 auto;
  padding:clamp(72px,8vw,100px) clamp(16px,4vw,32px) clamp(48px,6vw,80px);
}

.page-header{
  display:flex;align-items:baseline;gap:clamp(16px,3vw,32px);
  padding-bottom:clamp(24px,4vw,40px);
  border-bottom:1px solid #ffffff18;
  margin-bottom:clamp(32px,5vw,56px);
}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(2.4rem,7vw,6rem);line-height:.9}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2.4rem,7vw,6rem);line-height:.9}

.lead{
  color:var(--muted);
  font-size:clamp(1rem,1.35vw,1.15rem);
  line-height:1.6;
  max-width:68ch;
  margin:0 0 clamp(32px,5vw,56px);
}

.video-feature{
  position:relative;
  background:#111;
  overflow:hidden;
  border-radius:2px;
}
.video-feature video{
  width:100%;
  display:block;
  aspect-ratio:16/9;
  object-fit:cover;
}

/* Back to top */
.btt{
  position:fixed;bottom:24px;right:24px;z-index:999;
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:50%;
  background:#00000080;border:1px solid #ffffff22;
  backdrop-filter:blur(6px);box-shadow:0 1px 4px #00000066;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  color:#fff;text-decoration:none;
}
.btt.visible{opacity:1;pointer-events:auto}
.btt:hover{background:#000000b0;transform:translateY(-2px)}
.btt svg{width:16px;height:16px;display:block}
</style>
</head>
<body id="top">
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<main class="wrap">
  <div class="page-header">
    <h2 class="case-num">03</h2>
    <h1 class="case-title">CALLING</h1>
  </div>

  <p class="lead">
    Moving image work spanning beauty, fashion, and portraiture.
    Each film is a collaboration — with a subject, a mood, and a moment that can't be staged.
  </p>

  <div class="video-feature">
    <video controls preload="metadata">
      <source src="videos/calling/callinginsta.mp4" type="video/mp4">
    </video>
  </div>
</main>
<a class="btt" href="#top" aria-label="Back to top" id="btt">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</a>
<script>
(function(){
  var btn = document.getElementById('btt');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', window.scrollY > 400);
  }, {passive:true});
})();
</script>
</body>
</html>
