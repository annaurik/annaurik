<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Photographer & Videographer</title>
<meta name="description" content="Anna Urik — London-based photographer, videographer and creative director. Cinematic photography & film across music, fashion, performance and brand." />
<style>
:root{
  --bg:#0e1114;
  --fg:#f4f1ea;
  --muted:#d7d2c8;
  --accent:#e0332f;
  --rule:#cfc7bb;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:var(--bg);
  color:var(--fg);
  font-family:"Minima Expanded SSi",Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
  line-height:1.3;
  font-synthesis-weight:none;
}
a{color:inherit;text-decoration:none}
a:hover{text-decoration:underline;text-underline-offset:4px}
a:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px}

.ig-link{display:inline-flex;align-items:center;gap:.5rem;color:inherit;text-decoration:none}
.ig-link:hover{text-decoration:underline;text-underline-offset:4px}
.ig-icon{width:1.2em;height:1.2em;object-fit:contain;display:block;filter:brightness(0) invert(1)}
.ig span{color:var(--fg)} /* match icon colour */

.hero{
  position:relative;
  overflow:hidden;
  min-height:100vh;
  display:grid;
}
.hero__bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.hero__overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,.2) 40%,rgba(0,0,0,.45) 100%)}
.hero__content{position:relative;z-index:2;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:clamp(16px,4vw,40px)}

/* Big name */
.hero h1{
  margin:0;
  font-weight:900;
  letter-spacing:.01em;
  color:var(--accent);
  line-height:.9;
  width:100%;
  font-size:clamp(52px,11vw,240px);
}
@media (min-width:768px){.hero h1{font-size:clamp(80px,10vw,260px)}}
@media (min-width:1600px){.hero h1{font-size:clamp(120px,9vw,300px)}}

/* Nav row */
.nav-row{display:flex;flex-direction:column;gap:12px}
.roles{font-size:clamp(14px,2.4vw,24px);font-weight:800;text-transform:uppercase}
.divider{height:1px;background:var(--rule);opacity:.9;display:none} /* hidden on mobile */
.nav-links{display:flex;flex-direction:column;gap:.2rem;font-size:clamp(20px,5vw,40px);font-weight:900;text-align:left}
.nav-links a{display:block}

@media (min-width:768px){
  .nav-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:clamp(14px,2vw,28px)}
  .divider{display:block;height:2px}
  .nav-links{font-size:clamp(24px,4.8vw,56px);text-align:right}
  .roles{font-size:clamp(16px,2.2vw,28px)}
}
@media (min-width:1600px){
  .nav-links{font-size:64px}
  .roles{font-size:30px}
}

/* Footer */
.foot{display:grid;grid-template-columns:1fr;gap:12px;align-items:end}
.ig{font-size:clamp(12px,1.8vw,16px)}
.tagline{margin:0;text-align:left;font-size:clamp(14px,1.9vw,18px);color:var(--muted)}
@media (min-width:768px){
  .foot{grid-template-columns:1fr auto}
  .tagline{text-align:right;max-width:48ch;font-size:clamp(16px,1.6vw,20px)}
}
@media (min-width:1600px){
  .ig{font-size:18px}
  .tagline{max-width:62ch;font-size:22px}
}
@supports (height:100dvh){.hero{min-height:100dvh}}
</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Anna Urik">
  <meta property="og:title" content="Anna Urik | Photographer & Videographer">
  <meta property="og:description" content="Anna Urik — London-based photographer, videographer and creative director. Cinematic photography & film across music, fashion, performance and brand.">
  <meta property="og:url" content="https://annaurik.com/">

</head>
<body>
<section class="hero" aria-label="Portfolio landing">
  <img class="hero__bg" src="photos/hero.webp" alt="" />
  <div class="hero__overlay" aria-hidden="true"></div>
  <div class="hero__content">

    <h1>ANNA<br>URIK</h1>

    <div class="nav-row">
      <div class="roles">
        <div>Photographer</div>
        <div>Videographer</div>
      </div>
      <div class="divider" role="presentation"></div>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/content">WORK</a>
        <a href="/about">ABOUT</a>
      </nav>
    </div>

    <div class="foot">
      <div class="ig">
        <a class="ig-link" href="https://www.instagram.com/anna.urik/?hl=en" aria-label="Instagram — anna.urik" target="_blank" rel="noopener">
          <img class="ig-icon" src="instagram.png" alt="" aria-hidden="true">
          <span>anna.urik</span>
        </a>
      </div>
      <p class="tagline">Cinematic photography &amp; film.<br>Creative direction across music, performance and brand.</p>
    </div>

  </div>
</section>
</body>
</html>
