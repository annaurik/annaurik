<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Gentle Gesture</title>
<meta name="description" content="Gentle Gesture — fashion and editorial photography by Anna Urik." />
<style>
:root{
  --bg:#1a1a1a;
  --fg:#f3f3f3;
  --muted:#e8e8e8cc;
  --accent:#E0332F;
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--fg);font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif}

.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
@media (max-width:980px){.back-home{top:12px;left:12px;padding:.5rem .75rem}}

/* ── Hero section ── */
.hero{
  max-width:var(--maxw);margin:0 auto;
  padding:clamp(48px,6vw,80px) clamp(16px,4vw,32px) clamp(24px,4vw,48px);
  display:grid;grid-template-columns:1.08fr 0.92fr;
  gap:clamp(24px,5vw,72px);align-items:start;
}
@media (max-width:1000px){.hero{grid-template-columns:1fr}}

.media-left{background:#222;overflow:hidden}
.media-left img{width:100%;height:auto;display:block}

.right{display:grid;grid-template-rows:auto auto 1fr;gap:clamp(14px,2.2vw,24px)}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(3.2rem,10vw,8rem);line-height:.9;letter-spacing:.01em}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2.2rem,6.2vw,4.2rem);line-height:.95}
.lead{margin:0;color:var(--muted);max-width:58ch;font-size:clamp(1rem,1.35vw,1.15rem);line-height:1.6}

.media-right{background:#222;overflow:hidden;margin-top:clamp(12px,2.4vw,24px)}
.media-right img{width:100%;height:auto;display:block}

@media (max-width:700px){
  .case-num{font-size:clamp(2.6rem,16vw,5rem)}
  .case-title{font-size:clamp(1.8rem,10vw,3rem)}
  .media-left,.media-right{max-height:75vw;overflow:hidden}
  .media-left img,.media-right img{height:100%;object-fit:cover;object-position:center}
}


/* ── Editorial gallery ── */
.gallery{
  max-width:960px;
  margin:0 auto;
  padding:clamp(24px,5vw,64px) clamp(24px,5vw,64px) clamp(64px,10vw,120px);
  display:flex;
  flex-direction:column;
  gap:clamp(28px,4vw,64px);
}
.row{
  display:grid;
  gap:clamp(12px,2vw,28px);
  align-items:start;
}
.r-7-5{grid-template-columns:7fr 5fr}
.r-5-7{grid-template-columns:5fr 7fr}
.r-6-6{grid-template-columns:1fr 1fr}
.r-6-4{grid-template-columns:6fr 4fr}
.r-4-6{grid-template-columns:4fr 6fr}
.r-3  {grid-template-columns:1fr 1fr 1fr}
.fig{margin:0}
.fig img{width:100%;height:auto;display:block}
.center   {max-width:72%;margin:0 auto}
.center-lg{max-width:88%;margin:0 auto}
.push-r   {max-width:72%;margin-left:auto}
.push-l   {max-width:72%;margin-right:auto}
@media(max-width:700px){
  .r-7-5,.r-5-7,.r-6-6,.r-6-4,.r-4-6{grid-template-columns:1fr}
  .r-3{grid-template-columns:1fr 1fr}
  .center,.center-lg,.push-r,.push-l{max-width:100%;margin:0}
}
@media(max-width:480px){.r-3{grid-template-columns:1fr}}


/* Back to top */
.btt{
  position:fixed;bottom:24px;right:24px;z-index:999;
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:50%;
  background:#00000080;border:1px solid #ffffff22;
  backdrop-filter:blur(6px);box-shadow:0 1px 4px #00000066;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  color:#fff;text-decoration:none;
}
.btt.visible{opacity:1;pointer-events:auto}
.btt:hover{background:#000000b0;transform:translateY(-2px)}
.btt svg{width:16px;height:16px;display:block}
</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body id="top">
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<main>
  <!-- Hero -->
  <div class="hero">
    <figure class="media-left">
      <img src="photos/gg/gg_28.webp" alt="Gentle Gesture — portrait" loading="eager" decoding="async">
    </figure>
    <section class="right">
      <h2 class="case-num">01</h2>
      <h1 class="case-title">GENTLE<br>GESTURE</h1>
      <p class="lead">
        A study in light and restraint. Shot across two days with a cast of performers,
        stylists, and collaborators, Gentle Gesture explores the space between stillness
        and movement — where fashion becomes a second skin and the camera becomes a witness.
      </p>
      <figure class="media-right">
        <img src="photos/gg/gg_05.webp" alt="Gentle Gesture — Day 2" loading="lazy" decoding="async">
      </figure>
    </section>
  </div>


  <div class="gallery">

    <!-- Single centred portrait to open -->
    <figure class="fig center">
      <img src="photos/gg/gg_09.webp" alt="" loading="eager" decoding="async">
    </figure>

    <!-- Two portraits side by side -->
    <div class="row r-6-6">
      <figure class="fig"><img src="photos/gg/gg_07.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_12.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <!-- Wide landscape breathes full width -->
    <figure class="fig center-lg">
      <img src="photos/gg/gg_15.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <!-- Offset pair — wider right -->
    <div class="row r-5-7">
      <figure class="fig"><img src="photos/gg/gg_10.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_23.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <!-- Single pushed right -->
    <figure class="fig push-r">
      <img src="photos/gg/gg_11.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <!-- Three equal — tighter rhythm -->
    <div class="row r-3">
      <figure class="fig"><img src="photos/gg/gg_06.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_08.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_29.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <!-- Landscape full width again -->
    <figure class="fig center-lg">
      <img src="photos/gg/gg_18.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <!-- Pair wider left -->
    <div class="row r-7-5">
      <figure class="fig"><img src="photos/gg/gg_30.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_44.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>


    <!-- Extra images -->
    <div class="row r-6-6">
      <figure class="fig"><img src="photos/gg/gg_13.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_22.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <figure class="fig center-lg">
      <img src="photos/gg/gg_16.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <div class="row r-5-7">
      <figure class="fig"><img src="photos/gg/gg_26.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/gg/gg_41.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <!-- Close with single centred -->
    <figure class="fig center">
      <img src="photos/gg/gg_45.webp" alt="" loading="lazy" decoding="async">
    </figure>

  </div>

</main>
<a class="btt" href="#top" aria-label="Back to top" id="btt">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</a>
<script>
(function(){
  var btn = document.getElementById('btt');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', window.scrollY > 400);
  }, {passive:true});
})();
</script>
</body>
</html>
