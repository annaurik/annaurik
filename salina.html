<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anna Urik | Salina</title>
<meta name="description" content="Salina — portrait and fashion photography by Anna Urik." />
<style>
:root{
  --bg:#0f0f0f;
  --fg:#f3f3f3;
  --muted:#e8e8e8cc;
  --accent:#E0332F;
  --maxw:1320px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--fg);font:400 16px/1.5 system-ui,-apple-system,"Segoe UI",Inter,Arial,sans-serif}

.back-home{
  position:fixed;top:16px;left:16px;z-index:10;
  display:inline-flex;align-items:center;
  padding:.55rem .9rem;border-radius:999px;
  background:#00000080;color:#fff;text-decoration:none;
  font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  border:1px solid #ffffff22;backdrop-filter:blur(6px);
  box-shadow:0 1px 2px #00000066;
}
.back-home:hover{background:#000000b0}
@media (max-width:980px){.back-home{top:12px;left:12px;padding:.5rem .75rem}}

.hero{
  max-width:var(--maxw);margin:0 auto;
  padding:clamp(48px,6vw,80px) clamp(16px,4vw,32px) clamp(24px,4vw,48px);
  display:grid;grid-template-columns:1.08fr 0.92fr;
  gap:clamp(24px,5vw,72px);align-items:start;
}
@media (max-width:1000px){.hero{grid-template-columns:1fr}}

.media-left{background:#222;overflow:hidden}
.media-left img{width:100%;height:auto;display:block}

.right{display:grid;grid-template-rows:auto auto 1fr;gap:clamp(14px,2.2vw,24px)}
.case-num{margin:0;color:var(--accent);font-weight:900;font-size:clamp(3.2rem,10vw,8rem);line-height:.9;letter-spacing:.01em}
.case-title{margin:0;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:.04em;font-size:clamp(2.2rem,6.2vw,4.2rem);line-height:.95}
.lead{margin:0;color:var(--muted);max-width:58ch;font-size:clamp(1rem,1.35vw,1.15rem);line-height:1.6}

.media-right{background:#222;overflow:hidden;margin-top:clamp(12px,2.4vw,24px)}
.media-right img{width:100%;height:auto;display:block}

@media (max-width:700px){
  .case-num{font-size:clamp(2.6rem,16vw,5rem)}
  .case-title{font-size:clamp(1.8rem,10vw,3rem)}
}



/* ── Editorial gallery ── */
.gallery{
  max-width:960px;
  margin:0 auto;
  padding:clamp(24px,5vw,64px) clamp(24px,5vw,64px) clamp(64px,10vw,120px);
  display:flex;
  flex-direction:column;
  gap:clamp(28px,4vw,64px);
}
.row{
  display:grid;
  gap:clamp(12px,2vw,28px);
  align-items:start;
}
.r-7-5{grid-template-columns:7fr 5fr}
.r-5-7{grid-template-columns:5fr 7fr}
.r-6-6{grid-template-columns:1fr 1fr}
.r-4-8{grid-template-columns:4fr 8fr}
.r-8-4{grid-template-columns:8fr 4fr}
.r-3  {grid-template-columns:1fr 1fr 1fr}
.fig{margin:0}
.fig img{width:100%;height:auto;display:block}
.center   {max-width:55%;margin:0 auto}
.center-lg{max-width:75%;margin:0 auto}
.push-r   {max-width:55%;margin-left:auto}
.push-l   {max-width:55%;margin-right:auto}
@media(max-width:700px){
  .r-7-5,.r-5-7,.r-6-6,.r-4-8,.r-8-4{grid-template-columns:1fr}
  .r-3{grid-template-columns:1fr 1fr}
  .center,.center-lg,.push-r,.push-l{max-width:100%;margin:0}
}
@media(max-width:480px){.r-3{grid-template-columns:1fr}}

</style>
</head>
<body>
<a class="back-home" href="/content" aria-label="Back to Work">WORK</a>

<main>
  <div class="hero">
    <figure class="media-left">
      <img src="photos/salina/salina_01.webp" alt="Salina" loading="eager" decoding="async">
    </figure>
    <section class="right">
      <h2 class="case-num">05</h2>
      <h1 class="case-title">SALINA</h1>
      <p class="lead">
        Portrait and fashion work that lingers at the boundary between the
        composed and the candid. Each frame is a negotiation — between the subject's
        presence and the lens's hunger to pin it down.
      </p>
      <figure class="media-right">
        <img src="photos/salina/salina_08.webp" alt="Salina — portrait" loading="lazy" decoding="async">
      </figure>
    </section>
  </div>


  <div class="gallery">

    <div class="row r-6-6">
      <figure class="fig"><img src="photos/salina/salina_01.webp" alt="" loading="eager" decoding="async"></figure>
      <figure class="fig"><img src="photos/salina/salina_08.webp" alt="" loading="eager" decoding="async"></figure>
    </div>

    <figure class="fig center-lg">
      <img src="photos/salina/salina_05.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <div class="row r-5-7">
      <figure class="fig"><img src="photos/salina/salina_02.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/salina/salina_03.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <figure class="fig center">
      <img src="photos/salina/salina_04.webp" alt="" loading="lazy" decoding="async">
    </figure>

    <div class="row r-7-5">
      <figure class="fig"><img src="photos/salina/salina_06.webp" alt="" loading="lazy" decoding="async"></figure>
      <figure class="fig"><img src="photos/salina/salina_07.webp" alt="" loading="lazy" decoding="async"></figure>
    </div>

    <figure class="fig push-r">
      <img src="photos/salina/salina_09.webp" alt="" loading="lazy" decoding="async">
    </figure>

  </div>

</main>
</body>
</html>
